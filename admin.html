<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - ICHARS</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { padding: 2rem; }
        .tab-content { display: none; padding: 2rem; background: white; border-radius: 1rem; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        .tabs-nav { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .tab-btn { padding: 0.5rem 1.5rem; cursor: pointer; border: 1px solid var(--border); border-radius: 0.5rem; background: white; }
        .tab-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Admin Dashboard</h1>
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="showTab('leads')">Leads</button>
            <button class="tab-btn" onclick="showTab('courses')">Courses</button>
            <button class="tab-btn" onclick="showTab('stats')">Stats</button>
            <a href="index.html" class="btn btn-outline">Back to Site</a>
        </div>
        <div id="leads" class="tab-content active">
            <h2>Leads</h2>
            <table id="leads-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Message</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="courses" class="tab-content">
            <h2>Courses</h2>
            <form id="course-form" class="flex-col gap-4" style="max-width: 500px; margin-bottom: 2rem;">
                <input type="text" name="title" placeholder="Course Title" required>
                <textarea name="description" placeholder="Description" required></textarea>
                <input type="text" name="imageUrl" placeholder="Image URL">
                <input type="text" name="duration" placeholder="Duration">
                <input type="text" name="price" placeholder="Price">
                <button type="submit" class="btn btn-primary">Add Course</button>
            </form>
            <div id="admin-courses-list"></div>
        </div>
        <div id="stats" class="tab-content">
            <h2>Update Stats</h2>
            <form id="stats-form" class="flex-col gap-4" style="max-width: 500px;">
                <label>Years in Operation</label>
                <input type="number" name="yearsInOperation" required>
                <label>Practitioners Trained</label>
                <input type="number" name="practitionersTrained" required>
                <label>Lives Touched</label>
                <input type="number" name="livesTouched" required>
                <button type="submit" class="btn btn-primary">Update Stats</button>
            </form>
        </div>
    </div>
    <script src="admin-script.js"></script>
</body>
</html>
